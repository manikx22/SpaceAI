  <text x="135" y="290" fill="#7dd3fc" font-size="22" font-family="Orbitron, Arial">Telemetry JSON</text>
  <text x="520" y="290" fill="#7dd3fc" font-size="22" font-family="Orbitron, Arial">/predict</text>
  <text x="892" y="290" fill="#7dd3fc" font-size="22" font-family="Orbitron, Arial">AI Pipeline</text>
  <text x="1268" y="290" fill="#7dd3fc" font-size="22" font-family="Orbitron, Arial">Mission Output</text>
  <text x="130" y="330" fill="#e2e8f0" font-size="20" font-family="Rajdhani, Arial">temperature</text>
  <text x="130" y="360" fill="#e2e8f0" font-size="20" font-family="Rajdhani, Arial">voltage</text>
  <text x="130" y="390" fill="#e2e8f0" font-size="20" font-family="Rajdhani, Arial">vibration</text>
  <text x="505" y="340" fill="#e2e8f0" font-size="20" font-family="Rajdhani, Arial">/health</text>
  <text x="505" y="370" fill="#e2e8f0" font-size="20" font-family="Rajdhani, Arial">/predict</text>
  <text x="505" y="400" fill="#e2e8f0" font-size="20" font-family="Rajdhani, Arial">/simulate</text>
  <text x="885" y="330" fill="#e2e8f0" font-size="20" font-family="Rajdhani, Arial">Anomaly Detection</text>
