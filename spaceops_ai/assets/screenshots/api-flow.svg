  <text x="190" y="675" fill="#e2e8f0" font-size="22" font-family="Rajdhani, Arial">{ "health_state": "WARNING", "fault_class": "Power Bus Instability",</text>
  <text x="190" y="710" fill="#e2e8f0" font-size="22" font-family="Rajdhani, Arial">  "failure_risk_pct": 61.4, "recommendation": "...", "digital_twin": { "risk_after": 47.2 } }</text>
