<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#030816"/>
  <text x="70" y="90" fill="#e2e8f0" font-size="42" font-family="Orbitron, Arial">SpaceOps AI API</text>
  <text x="70" y="130" fill="#7dd3fc" font-size="20" font-family="Rajdhani, Arial">Inference and simulation workflow</text>
  <rect x="90" y="230" width="260" height="160" rx="22" fill="#0c1830" stroke="#1ec9ff" stroke-opacity="0.4"/>
